name: poshu_bondhu
description: A pet care app for your beloved companions.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  image_picker: ^1.0.4
  fl_chart: ^0.65.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.2
  intl: ^0.18.1
  file_picker: ^8.0.0
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.1
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/